    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Birthday Code</title>

        <style>
            body {
                margin: 0;
                height: 100vh;
                background-image: url("kartta.png");
                background-size: cover;
                background-position: center;
                font-family: Georgia, serif;
                color: white;
                display: flex;
                justify-content: center;
                align-items: center;
                overflow: hidden;
            }

            .scene {
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .boromir {
                width: 850px;
                opacity: 0;
                animation: boromirAppears 4s ease forwards;
            }

            .speech {
                position: absolute;
                top: 20px;
                right: -180px;

                background: white;
                color: black;

                padding: 22px 28px;
                border-radius: 30px;

                font-size: 26px;
                font-weight: bold;
                line-height: 1.3;

                max-width: 380px;

                opacity: 0;
                animation: speechAppears 2s ease forwards;
                animation-delay: 3.5s;
            }

            .speech::after {
                content: "";
                position: absolute;
                left: 35px;
                bottom: -22px;

                border-width: 22px 22px 0;
                border-style: solid;
                border-color: white transparent transparent transparent;
            }

            @keyframes boromirAppears {
                from {
                    opacity: 0;
                    transform: scale(0.85);
                }
                to {
                    opacity: 1;
                    transform: scale(1);
                }
            }

            @keyframes speechAppears {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>
    </head>

    <body>

    <div class="scene">

        <img src="boromir2.png" alt="Boromir" class="boromir">

        <div class="speech">
            One does not simply<br>
            say "Happy Birthday"...<br><br>

            without making a code for it.<br><br>

            Happy Birthday, Nasu!
        </div>

    </div>

    </body>
    </html>
